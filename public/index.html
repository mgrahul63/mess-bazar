<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Mess Bazar — Track group meals, bazar expenses and monthly settlements"
    />
   <link rel="icon" type="image/png" href="logo.png" />
    <title>Mess Bazar</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0d1f1f;
        font-family: "Inter", system-ui, sans-serif;
        color: #e2f0ef;
      }
      input:focus,
      select:focus {
        outline: 2px solid #2dd4bf;
        outline-offset: 1px;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0d1f1f;
      }
      ::-webkit-scrollbar-thumb {
        background: #1f4040;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
